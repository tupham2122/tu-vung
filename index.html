<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Học Từ Vựng Dập Kim Loại 🇻🇳🇯🇵</title>

<style>
/* ===== CSS GIỮ NGUYÊN 100% BẢN GỐC ===== */
@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;700&display=swap');

:root {
    --primary:#1A2557;--accent:#C0392B;--success:#2ECC71;
    --warning:#F1C40F;--bg:#F5F6FA;--card-bg:#FFF;
    --text-main:#1C1C2E;--text-muted:#6B7280;
    --border:#E5E7EB;--radius-lg:16px;--radius-md:12px;
    --shadow:0 4px 20px rgba(0,0,0,.06);
    --transition:all .3s cubic-bezier(.4,0,.2,1)
}
*{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:'Be Vietnam Pro',sans-serif;
    background:var(--bg);color:var(--text-main);
    padding-bottom:90px
}
header{
    background:linear-gradient(135deg,var(--primary),#253275);
    color:#fff;padding:24px 16px;text-align:center;
    border-bottom-left-radius:var(--radius-lg);
    border-bottom-right-radius:var(--radius-lg);
    box-shadow:var(--shadow);margin-bottom:20px
}
header h1{font-size:1.35rem;font-weight:700}
header p{font-size:.85rem;opacity:.85}
.container{max-width:600px;margin:0 auto;padding:0 16px}

.view-section{display:none}
.view-section.active{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

.flashcard-wrapper{perspective:1000px;margin:16px auto;height:300px}
.flashcard{
    width:100%;height:100%;position:relative;
    transform-style:preserve-3d;
    transition:transform .5s;cursor:pointer
}
.flashcard.flipped{transform:rotateY(180deg)}
.card-face{
    position:absolute;width:100%;height:100%;
    backface-visibility:hidden;border-radius:16px;
    box-shadow:var(--shadow);padding:24px;
    display:flex;flex-direction:column;
    justify-content:center;align-items:center;
    text-align:center;border:1px solid var(--border)
}
.card-front{background:#fff}
.card-back{
    background:var(--primary);color:#fff;
    transform:rotateY(180deg)
}
.word-jp{font-family:'Noto Sans JP';font-size:2.1rem;font-weight:700;color:var(--accent)}
.word-kana{font-family:'Noto Sans JP';font-size:1.1rem;color:var(--text-muted)}
.word-vn{font-size:1.5rem;font-weight:700}
.word-desc{font-size:.9rem;opacity:.85}

.action-container{display:flex;gap:12px;margin-top:16px}
.btn{
    flex:1;padding:14px;border:none;border-radius:12px;
    font-weight:600;cursor:pointer
}
.btn-wrong{background:#FADBD8;color:#C0392B}
.btn-correct{background:#D4EFDF;color:#196F3D}
</style>
</head>

<body>
<header>
<h1>Sổ Tay Học Từ Vựng Dập Kim Loại</h1>
<p>Flashcard ôn tập thông minh</p>
</header>

<div class="container">
<section id="view-flashcard" class="view-section active">
    <div id="card-area"></div>
    <div class="action-container">
        <button class="btn btn-wrong" onclick="handleCardAction(false)">❌ Chưa thuộc</button>
        <button class="btn btn-correct" onclick="handleCardAction(true)">✅ Đã thuộc</button>
    </div>
</section>
</div>

<script>
/* ========= DATA ========= */
const DICT_DATA = [
 {id:1,cat:"Thiết bị",jp:"プレス機械",kana:"ぷれすきかい",vn:"Máy dập",desc:"Thiết bị dập kim loại"},
 {id:2,cat:"Khuôn",jp:"金型",kana:"かながた",vn:"Khuôn dập",desc:"Bộ khuôn tạo hình"},
 {id:3,cat:"Gia công",jp:"曲げ加工",kana:"まげかこう",vn:"Gia công uốn",desc:"Uốn kim loại tấm"}
];

/* ========= PROGRESS ========= */
let userProgress = JSON.parse(localStorage.getItem("press_study_progress")) || {};
if(typeof userProgress!=="object") userProgress={};

let currentSessionWords=[];
let currentCardIndex=0;

DICT_DATA.forEach(w=>{
 if(!userProgress[w.id]){
   userProgress[w.id]={status:"not-learned",wrongCount:0};
 }
});
saveProgress();

/* ========= CORE ========= */
function saveProgress(){
 localStorage.setItem("press_study_progress",JSON.stringify(userProgress));
}

function initSession(){
 currentSessionWords=[...DICT_DATA].sort(()=>Math.random()-.5);
 currentCardIndex=0;
 renderFlashcard();
}

function renderFlashcard(){
 const area=document.getElementById("card-area");
 if(!currentSessionWords.length){area.innerHTML="Hết từ";return}
 const w=currentSessionWords[currentCardIndex];
 const p=userProgress[w.id];

 area.innerHTML=`
 <div class="flashcard-wrapper" onclick="toggleFlip()">
  <div id="main-card" class="flashcard">
   <div class="card-face card-front">
    <div class="word-jp">${w.jp}</div>
    <div class="word-kana">${w.kana}</div>
    ${p.wrongCount>0?`<div>⚠️ Sai ${p.wrongCount} lần</div>`:""}
   </div>
   <div class="card-face card-back">
    <div class="word-vn">${w.vn}</div>
    <div class="word-desc">${w.desc}</div>
   </div>
  </div>
 </div>
 <div style="text-align:center">${currentCardIndex+1}/${currentSessionWords.length}</div>
 `;

 setTimeout(()=>{
  const c=document.getElementById("main-card");
  if(c)c.classList.remove("flipped");
 },0);
}

function toggleFlip(){
 const c=document.getElementById("main-card");
 if(c)c.classList.toggle("flipped");
}

/* ========= ✅ FIXED LOGIC ========= */
function handleCardAction(correct){
 const w=currentSessionWords[currentCardIndex];
 const p=userProgress[w.id];

 if(correct){
   if(p.status==="review") p.status="learned";
   if(p.wrongCount>0) p.wrongCount--;
 }else{
   p.status="review";
   p.wrongCount++;
 }

 saveProgress();
 currentCardIndex++;
 if(currentCardIndex>=currentSessionWords.length) currentCardIndex=0;
 renderFlashcard();
}

initSession();
</script>
</body>
</html>
